<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>3D Ambi | Interactive Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .container { max-width: 600px; text-align: center; }
    .screen-wrap { background: #1e293b; padding: 40px; border-radius: 12px; border: 4px solid #334155; position: relative; margin: 20px 0; overflow: hidden; }
    .content { font-size: 32px; font-weight: bold; transition: color 0.2s; }
    .decoy { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; opacity: 0; pointer-events: none; }
    input[type=range] { width: 100%; margin-top: 40px; cursor: pointer; }
    .label { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    .status { margin-bottom: 20px; font-weight: bold; padding: 8px 16px; border-radius: 20px; background: #10b981; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>3D Ambi Mechanic</h1>
    <p>Simulate head rotation to see the secure rendering in action.</p>
    
    <div id="status" class="status">✅ ALIGNED: Real Question Visible</div>

    <div class="screen-wrap">
      <div id="real" class="content">What is the color of the sky?</div>
      <div id="decoy" class="content decoy">Who wrote the Great Gatsby?</div>
    </div>

    <input type="range" id="angle" min="-45" max="45" value="0" />
    <div class="label">Rotate Head (Simulated)</div>
    
    <div style="margin-top: 40px; color: #94a3b8;">
      Questions are rendered via WebGL. Decryption keys and real content never touch the plain DOM.
    </div>
    
    <button onclick="location.href='index.html'" style="margin-top: 20px; padding: 10px 20px; border-radius: 6px; border: none; background: #3b82f6; color: white; cursor: pointer;">Try Live Assessment</button>
  </div>

  <script>
    const slider = document.getElementById('angle');
    const real = document.getElementById('real');
    const decoy = document.getElementById('decoy');
    const status = document.getElementById('status');

    slider.oninput = (e) => {
      const angle = Math.abs(e.target.value);
      const opacity = Math.min(1, Math.max(0, (angle - 12) / 10)); // Transition between 12 and 22 degrees
      
      real.style.opacity = 1 - opacity;
      decoy.style.opacity = opacity;
      
      if (angle > 15) {
        status.textContent = '❌ OUT OF ZONE: Decoy Visible';
        status.style.background = '#ef4444';
      } else {
        status.textContent = '✅ ALIGNED: Real Question Visible';
        status.style.background = '#10b981';
      }
    };
  </script>
</body>
</html>
